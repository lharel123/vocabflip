<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VocabFlip">
<title>VocabFlip 🇮🇱</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #1a1a2e; color: #fff; font-family: -apple-system, sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; user-select: none; }
  #header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px 8px; }
  #title { font-size: 22px; font-weight: 800; }
  #counter { font-size: 15px; color: #aaa; font-weight: 600; }
  #progress-bg { height: 4px; background: #333; margin: 0 20px; border-radius: 2px; }
  #progress-fill { height: 4px; background: #f39c12; border-radius: 2px; width: 0%; transition: width 0.3s; }
  #hints { display: flex; justify-content: space-between; padding: 8px 24px; height: 28px; }
  .hint { font-size: 13px; font-weight: 700; letter-spacing: 1px; opacity: 0; transition: opacity 0.1s; }
  #hint-review { color: #e74c3c; }
  #hint-know { color: #27ae60; }
  #card-area { flex: 1; display: flex; align-items: center; justify-content: center; perspective: 1200px; }
  #card-container { width: calc(100vw - 40px); max-width: 400px; height: 55dvh; position: relative; }
  .card { position: absolute; width: 100%; height: 100%; border-radius: 22px; padding: 28px; display: flex; flex-direction: column; align-items: center; justify-content: center; backface-visibility: hidden; -webkit-backface-visibility: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  #card-front { background: #16213e; transform-origin: center; }
  #card-back { background: #0f3460; transform: rotateY(180deg); }
  #card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(.4,0,.2,1); }
  #card-inner.flipped { transform: rotateY(180deg); }
  .lang-badge { position: absolute; top: 0; left: 0; font-size: 11px; color: #aaa; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }
  #word-en { font-size: 48px; font-weight: 900; text-align: center; color: #fff; }
  #tap-hint { position: absolute; bottom: 0; font-size: 13px; color: #555; }
  #word-he { font-size: 48px; font-weight: 900; text-align: center; color: #f39c12; direction: rtl; }
  .divider { width: 60px; height: 2px; background: #2a4a7a; margin: 16px 0; }
  #sent-en { font-size: 15px; color: #ccc; text-align: center; line-height: 1.5; }
  #sent-he { font-size: 15px; color: #aaa; text-align: center; line-height: 1.5; direction: rtl; margin-top: 8px; }
  #buttons { display: flex; gap: 12px; padding: 8px 20px; }
  .btn { flex: 1; border: none; border-radius: 16px; padding: 16px; font-size: 16px; font-weight: 700; color: #fff; cursor: pointer; transition: transform 0.1s, opacity 0.1s; }
  .btn:active { transform: scale(0.96); opacity: 0.85; }
  #btn-review { background: #c0392b; }
  #btn-know { background: #27ae60; }
  #score-row { display: flex; justify-content: center; gap: 30px; padding: 6px 0 max(16px, env(safe-area-inset-bottom)); }
  .score { font-size: 16px; font-weight: 700; }
  #score-known { color: #27ae60; }
  #score-review { color: #e74c3c; }
  /* Done screen */
  #done-screen { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
  #done-screen.show { display: flex; }
  #done-emoji { font-size: 72px; margin-bottom: 16px; }
  #done-title { font-size: 32px; font-weight: 900; margin-bottom: 8px; }
  #done-sub { font-size: 16px; color: #aaa; margin-bottom: 36px; }
  #done-stats { display: flex; gap: 20px; margin-bottom: 40px; }
  .stat-box { border-radius: 16px; padding: 20px 30px; text-align: center; }
  .stat-num { font-size: 40px; font-weight: 900; }
  .stat-lbl { font-size: 14px; color: rgba(255,255,255,0.8); margin-top: 4px; }
  #restart-btn { background: #f39c12; border: none; border-radius: 16px; padding: 16px 40px; font-size: 18px; font-weight: 800; color: #fff; cursor: pointer; }
  #game-area { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
</style>
</head>
<body>
<div id="game-area">
  <div id="header">
    <span id="title">VocabFlip 🇮🇱</span>
    <span id="counter">1 / 50</span>
  </div>
  <div id="progress-bg"><div id="progress-fill"></div></div>
  <div id="hints">
    <span class="hint" id="hint-review">← REVIEW</span>
    <span class="hint" id="hint-know">KNOW IT →</span>
  </div>
  <div id="card-area">
    <div id="card-container">
      <div id="card-inner">
        <div class="card" id="card-front">
          <span class="lang-badge">English</span>
          <span id="word-en"></span>
          <span id="tap-hint">Tap to reveal Hebrew ↓</span>
        </div>
        <div class="card" id="card-back">
          <span class="lang-badge" style="color:#f39c12">עברית</span>
          <span id="word-he"></span>
          <div class="divider"></div>
          <span id="sent-en"></span>
          <span id="sent-he"></span>
        </div>
      </div>
    </div>
  </div>
  <div id="buttons">
    <button class="btn" id="btn-review">✕&nbsp; Review Again</button>
    <button class="btn" id="btn-know">✓&nbsp; Know It</button>
  </div>
  <div id="score-row">
    <span class="score" id="score-known">✓ 0</span>
    <span class="score" id="score-review">✕ 0</span>
  </div>
</div>
<div id="done-screen">
  <div id="done-emoji">🎉</div>
  <div id="done-title">Session Complete!</div>
  <div id="done-sub">50 cards reviewed</div>
  <div id="done-stats">
    <div class="stat-box" style="background:#27ae60"><div class="stat-num" id="final-known">0</div><div class="stat-lbl">Knew it</div></div>
    <div class="stat-box" style="background:#e74c3c"><div class="stat-num" id="final-review">0</div><div class="stat-lbl">Review</div></div>
  </div>
  <button id="restart-btn">Start Again 🔄</button>
</div>
<script>
const WORDS = [
  {en:'Apple',he:'תפוח',sentence:'I eat an apple every morning.',heSentence:'אני אוכל תפוח כל בוקר.'},
  {en:'Water',he:'מים',sentence:'Please bring me a glass of water.',heSentence:'בבקשה תביא לי כוס מים.'},
  {en:'Book',he:'ספר',sentence:'She reads a book before bed.',heSentence:'היא קוראת ספר לפני השינה.'},
  {en:'House',he:'בית',sentence:'Our house has three rooms.',heSentence:'לבית שלנו שלושה חדרים.'},
  {en:'Car',he:'מכונית',sentence:'He drives his car to work.',heSentence:'הוא נוסע במכונית לעבודה.'},
  {en:'Friend',he:'חבר',sentence:'My best friend lives nearby.',heSentence:'החבר הכי טוב שלי גר בקרבת מקום.'},
  {en:'Time',he:'זמן',sentence:'There is no time to waste.',heSentence:'אין זמן לבזבז.'},
  {en:'Day',he:'יום',sentence:'Today is a beautiful day.',heSentence:'היום הוא יום יפה.'},
  {en:'Night',he:'לילה',sentence:'The stars shine at night.',heSentence:'הכוכבים זורחים בלילה.'},
  {en:'Food',he:'אוכל',sentence:'The food smells delicious.',heSentence:'האוכל מריח נפלא.'},
  {en:'Love',he:'אהבה',sentence:'Love is the greatest gift.',heSentence:'האהבה היא המתנה הגדולה ביותר.'},
  {en:'Work',he:'עבודה',sentence:'Hard work pays off in the end.',heSentence:'עבודה קשה משתלמת בסופו של דבר.'},
  {en:'City',he:'עיר',sentence:'Tel Aviv is a vibrant city.',heSentence:'תל אביב היא עיר תוססת.'},
  {en:'Music',he:'מוזיקה',sentence:'Music makes me feel happy.',heSentence:'מוזיקה גורמת לי להרגיש שמח.'},
  {en:'School',he:'בית ספר',sentence:'The children go to school every day.',heSentence:'הילדים הולכים לבית ספר כל יום.'},
  {en:'Dog',he:'כלב',sentence:'The dog runs in the park.',heSentence:'הכלב רץ בפארק.'},
  {en:'Cat',he:'חתול',sentence:'Our cat sleeps all afternoon.',heSentence:'החתול שלנו ישן כל אחר הצהריים.'},
  {en:'Sun',he:'שמש',sentence:'The sun rises in the east.',heSentence:'השמש זורחת במזרח.'},
  {en:'Rain',he:'גשם',sentence:'The rain falls on the fields.',heSentence:'הגשם יורד על השדות.'},
  {en:'Tree',he:'עץ',sentence:'There is an old tree in the garden.',heSentence:'יש עץ ישן בגינה.'},
  {en:'Money',he:'כסף',sentence:'Money cannot buy happiness.',heSentence:'כסף לא יכול לקנות אושר.'},
  {en:'Family',he:'משפחה',sentence:'Family is the most important thing.',heSentence:'משפחה היא הדבר החשוב ביותר.'},
  {en:'Child',he:'ילד',sentence:'Every child deserves an education.',heSentence:'כל ילד ראוי לחינוך.'},
  {en:'Mother',he:'אמא',sentence:'My mother makes the best soup.',heSentence:'אמא שלי מכינה את המרק הכי טוב.'},
  {en:'Father',he:'אבא',sentence:'His father taught him to ride a bike.',heSentence:'אביו לימד אותו לרכוב על אופניים.'},
  {en:'Brother',he:'אח',sentence:'My brother is two years older than me.',heSentence:'אחי גדול ממני בשנתיים.'},
  {en:'Sister',he:'אחות',sentence:'My sister loves to paint.',heSentence:'אחותי אוהבת לצייר.'},
  {en:'Door',he:'דלת',sentence:'Please close the door quietly.',heSentence:'בבקשה סגור את הדלת בשקט.'},
  {en:'Window',he:'חלון',sentence:'Open the window for fresh air.',heSentence:'פתח את החלון לאוויר צח.'},
  {en:'Table',he:'שולחן',sentence:'We eat dinner at the table together.',heSentence:'אנחנו אוכלים ארוחת ערב יחד ליד השולחן.'},
  {en:'Chair',he:'כיסא',sentence:'Please sit in the chair.',heSentence:'בבקשה שב על הכיסא.'},
  {en:'Phone',he:'טלפון',sentence:'I forgot my phone at home.',heSentence:'שכחתי את הטלפון בבית.'},
  {en:'Computer',he:'מחשב',sentence:'She works on her computer all day.',heSentence:'היא עובדת על המחשב כל היום.'},
  {en:'Street',he:'רחוב',sentence:'The street is very busy today.',heSentence:'הרחוב עמוס מאוד היום.'},
  {en:'Bread',he:'לחם',sentence:'Fresh bread smells wonderful.',heSentence:'לחם טרי מריח נהדר.'},
  {en:'Coffee',he:'קפה',sentence:'He starts his day with coffee.',heSentence:'הוא מתחיל את יומו עם קפה.'},
  {en:'Key',he:'מפתח',sentence:'I lost my house key again.',heSentence:'שוב איבדתי את מפתח הבית.'},
  {en:'Story',he:'סיפור',sentence:'Tell me a story before I sleep.',heSentence:'ספר לי סיפור לפני שאישן.'},
  {en:'Word',he:'מילה',sentence:'Every word has a meaning.',heSentence:'לכל מילה יש משמעות.'},
  {en:'Dream',he:'חלום',sentence:'Follow your dream and never give up.',heSentence:'עקוב אחרי החלום שלך ואל תוותר.'},
  {en:'Heart',he:'לב',sentence:'He has a kind heart.',heSentence:'יש לו לב טוב.'},
  {en:'Hand',he:'יד',sentence:'Wash your hands before eating.',heSentence:'שטוף את הידיים לפני האכילה.'},
  {en:'Eye',he:'עין',sentence:'She has beautiful blue eyes.',heSentence:'יש לה עיניים כחולות יפות.'},
  {en:'Road',he:'דרך',sentence:'The road to success is long.',heSentence:'הדרך להצלחה ארוכה.'},
  {en:'Hope',he:'תקווה',sentence:'Never lose hope.',heSentence:'אל תאבד תקווה לעולם.'},
  {en:'Market',he:'שוק',sentence:'We buy vegetables at the market.',heSentence:'אנחנו קונים ירקות בשוק.'},
  {en:'Milk',he:'חלב',sentence:'I drink milk every morning.',heSentence:'אני שותה חלב כל בוקר.'},
  {en:'Letter',he:'מכתב',sentence:'She wrote a letter to her grandmother.',heSentence:'היא כתבה מכתב לסבתא שלה.'},
  {en:'Question',he:'שאלה',sentence:'Do you have a question?',heSentence:'יש לך שאלה?'},
  {en:'Answer',he:'תשובה',sentence:'I know the answer to this.',heSentence:'אני יודע את התשובה לזה.'},
];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b;}

let deck=shuffle(WORDS), idx=0, known=0, review=0, flipped=false;
let startX=0, startY=0, isDragging=false, currentX=0;

const cardInner=document.getElementById('card-inner');
const cardContainer=document.getElementById('card-container');
const gameArea=document.getElementById('game-area');
const doneScreen=document.getElementById('done-screen');
const hintKnow=document.getElementById('hint-know');
const hintReview=document.getElementById('hint-review');

function updateDisplay(){
  const w=deck[idx];
  document.getElementById('word-en').textContent=w.en;
  document.getElementById('word-he').textContent=w.he;
  document.getElementById('sent-en').textContent=w.sentence;
  document.getElementById('sent-he').textContent=w.heSentence;
  document.getElementById('counter').textContent=`${idx+1} / ${deck.length}`;
  document.getElementById('progress-fill').style.width=`${(idx/deck.length)*100}%`;
  document.getElementById('score-known').textContent=`✓ ${known}`;
  document.getElementById('score-review').textContent=`✕ ${review}`;
  cardInner.style.transition='transform 0.5s cubic-bezier(.4,0,.2,1)';
  cardInner.classList.remove('flipped');
  cardContainer.style.transform='';
  cardContainer.style.transition='';
  hintKnow.style.opacity='0';
  hintReview.style.opacity='0';
  flipped=false;
}

function flipCard(){
  flipped=!flipped;
  cardInner.style.transition='transform 0.5s cubic-bezier(.4,0,.2,1)';
  cardInner.classList.toggle('flipped',flipped);
}

function nextCard(didKnow){
  const toX=didKnow?window.innerWidth*1.5:-window.innerWidth*1.5;
  cardContainer.style.transition='transform 0.25s ease';
  cardContainer.style.transform=`translateX(${toX}px) rotate(${didKnow?15:-15}deg)`;
  if(didKnow) known++; else review++;
  setTimeout(()=>{
    idx++;
    if(idx>=deck.length){showDone();return;}
    updateDisplay();
  },260);
}

function showDone(){
  gameArea.style.display='none';
  doneScreen.classList.add('show');
  document.getElementById('final-known').textContent=known;
  document.getElementById('final-review').textContent=review;
}

document.getElementById('restart-btn').onclick=()=>{
  deck=shuffle(WORDS);idx=0;known=0;review=0;flipped=false;
  gameArea.style.display='flex';
  doneScreen.classList.remove('show');
  updateDisplay();
};

// Tap to flip
cardContainer.addEventListener('click',(e)=>{
  if(isDragging||Math.abs(currentX)>5)return;
  flipCard();
});

// Swipe
cardContainer.addEventListener('touchstart',(e)=>{
  startX=e.touches[0].clientX; startY=e.touches[0].clientY;
  isDragging=false; currentX=0;
  cardContainer.style.transition='';
},{passive:true});

cardContainer.addEventListener('touchmove',(e)=>{
  const dx=e.touches[0].clientX-startX;
  const dy=e.touches[0].clientY-startY;
  if(Math.abs(dy)>Math.abs(dx)&&!isDragging)return;
  isDragging=true; currentX=dx;
  e.preventDefault();
  const rot=dx/window.innerWidth*15;
  cardContainer.style.transform=`translateX(${dx}px) rotate(${rot}deg)`;
  hintKnow.style.opacity=Math.max(0,Math.min(1,(dx-40)/60));
  hintReview.style.opacity=Math.max(0,Math.min(1,(-dx-40)/60));
},{passive:false});

cardContainer.addEventListener('touchend',(e)=>{
  if(currentX>100){nextCard(true);}
  else if(currentX<-100){nextCard(false);}
  else{
    cardContainer.style.transition='transform 0.3s ease';
    cardContainer.style.transform='';
    hintKnow.style.opacity='0';
    hintReview.style.opacity='0';
  }
  setTimeout(()=>{isDragging=false;},50);
},{passive:true});

document.getElementById('btn-know').onclick=()=>nextCard(true);
document.getElementById('btn-review').onclick=()=>nextCard(false);

updateDisplay();
</script>
</body>
</html>
